{% extends "base.html" %}

{% block header_title %}Academic Calendar{% endblock %}

{% block content %}
<div class="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 mb-8">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h3 class="text-2xl font-bold text-slate-800">Academic Calendar</h3>
            <p class="text-slate-500">View and manage your schedule and subject events.</p>
        </div>
        <button onclick="openEventModal()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center gap-2">
            <i class="fas fa-plus"></i>
            Create Event
        </button>
    </div>
    <div id="calendar" class="min-h-[600px]"></div>
</div>

<!-- Event Creation Modal -->
<div id="eventModal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden">
        <div class="p-8">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-2xl font-bold text-slate-800">Create Event</h3>
                <button onclick="closeEventModal()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <i class="fas fa-times text-slate-400"></i>
                </button>
            </div>
            <form action="{{ url_for('faculty.create_event') }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Event Title</label>
                    <input type="text" name="title" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Description</label>
                    <textarea name="description" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none transition-all"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Date</label>
                        <input type="date" name="date" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Target</label>
                        <select name="target_role" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none transition-all">
                            <option value="personal">Personal Reminder</option>
                            <option value="student">Students (Select Subject)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Subject (for Student events)</label>
                    <select name="subject_id" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none transition-all">
                        <option value="">None / Personal</option>
                        {% for sub in subjects %}
                        <option value="{{ sub.id }}">{{ sub.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-all shadow-lg shadow-blue-200">
                    Create Event
                </button>
            </form>
        </div>
    </div>
</div>

<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek'
        },
        events: '/api/events',
        eventClick: function(info) {
            alert(info.event.title + (info.event.extendedProps.description ? ': ' + info.event.extendedProps.description : ''));
        }
    });
    calendar.render();
});
function openEventModal() { document.getElementById('eventModal').classList.remove('hidden'); }
function closeEventModal() { document.getElementById('eventModal').classList.add('hidden'); }
</script>
<style>
    .fc .fc-button-primary { background-color: #3b82f6; border-color: #3b82f6; border-radius: 0.75rem; font-weight: bold; }
    .fc .fc-toolbar-title { font-weight: 800; color: #1e293b; }
    .fc .fc-event { cursor: pointer; border-radius: 4px; padding: 4px; border: none; font-size: 0.85em; }
</style>
{% endblock %}
